[platformio]
default_envs = esp32s3-classic, esp32s3-mlkem512, esp32s3-mlkem512-dilithium2, esp32s3-mlkem512-dilithium5, esp32s3-mlkem768, esp32s3-mlkem768-dilithium2, esp32s3-mlkem768-dilithium5, esp32s3-mlkem1024, esp32s3-mlkem1024-dilithium2, esp32s3-mlkem1024-dilithium5, esp32s3-dilithium2, esp32s3-dilithium3, esp32s3-dilithium5, esp32s3-dilithium2-aes, esp32s3-dilithium3-aes, esp32s3-dilithium5-aes, esp32s3-failure-tiny, esp32s3-failure-large

[env:esp32s3-classic]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_port = COM8
upload_speed = 115200
build_unflags = -Os
build_flags =
  -O3
  -DARDUINO_LOOP_STACK_SIZE=65536
  -DVH_NO_LIBOQS
  -DVH_NO_STDIO
  -DVH_NO_ENV
  -DMLK_CONFIG_FILE=\"mlk_config_esp32.h\"
  -DMLK_CONFIG_PARAMETER_SET=768
  -DDILITHIUM_MODE=3
  -Isrc
  -Isrc/kyber_internal
  -Isrc/dilithium_internal
build_src_filter =
  +<*>
  -<kyber_internal/fips202x4.c>
  -<kyber_internal/sha3.c>
  -<kyber_internal/sha3x4.c>

