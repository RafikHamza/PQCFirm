[env:esp32s3-failure-tiny]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_port = COM8
upload_speed = 115200
build_unflags = -Os
build_flags =
  -O3
  -DARDUINO_LOOP_STACK_SIZE=8192
  -DFAILURE_REPRO_STACK_BYTES=8192
  -DVH_NO_LIBOQS
  -DVH_NO_STDIO
  -DVH_NO_ENV
  -DMLK_CONFIG_FILE=\"mlk_config_esp32.h\"
  -DMLK_CONFIG_PARAMETER_SET=768
  -DDILITHIUM_MODE=3
  -Isrc
  -Isrc/kyber_internal
  -Isrc/dilithium_internal
build_src_filter =
  +<main.cpp>
  +<aes256ctr.c>
  +<aes256ctr.h>
  +<tiny_sha3.c>
  +<randombytes_esp32.c>
  +<mlk_config_esp32.h>
  +<kyber_internal/*>
  -<failure_reproduction.cpp>
  -<kyber_internal/fips202x4.c>
  -<kyber_internal/sha3.c>
  -<kyber_internal/sha3x4.c>
  -<dilithium_internal/*>

