[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts =
  pre:extra_script.py
build_unflags = -Os
build_flags =
  -O3
  -DVH_NO_LIBOQS
  -DVH_NO_STDIO
  -DVH_NO_ENV
  -DMLK_CONFIG_FILE=\"mlk_config_esp32.h\"
  -DARDUINO_LOOP_STACK_SIZE=65536
  -DESP32_CURRENT_MA_PER_MHZ=0.2
  -DESP32_VOLTAGE_V=3.3

