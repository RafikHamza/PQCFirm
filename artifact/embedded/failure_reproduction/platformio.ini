[platformio]
default_envs = esp32s3-crash-tiny, esp32s3-crash-large

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 115200
build_flags =
  -O3
  -DMLK_CONFIG_FILE=\"mlk_config_esp32.h\"
  -DMLK_CONFIG_PARAMETER_SET=768
  -DVH_NO_LIBOQS
  -Isrc
  -Isrc/kyber_internal

[env:esp32s3-crash-tiny]
build_flags =
  ${env.build_flags}
  -DARDUINO_LOOP_STACK_SIZE=8192
  -DCRASH_TINY_STACK

[env:esp32s3-crash-large]
build_flags =
  ${env.build_flags}
  -DARDUINO_LOOP_STACK_SIZE=98304
